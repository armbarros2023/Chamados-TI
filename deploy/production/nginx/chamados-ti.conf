server {
    listen 80;
    listen [::]:80;
    server_name chamados.arbtechinfo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chamados.arbtechinfo.com;

    # Certbot preenche estes caminhos ao emitir o certificado.
    ssl_certificate /etc/letsencrypt/live/chamados.arbtechinfo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chamados.arbtechinfo.com/privkey.pem;

    root /opt/chamados-ti/current/dist;
    index index.html;
    client_max_body_size 105m;

    include /etc/nginx/snippets/chamados-ti-security-headers.conf;

    location /api/v1/ {
        limit_req zone=chamados_ti_api burst=20 nodelay;
        limit_conn chamados_ti_conn 20;
        proxy_pass http://127.0.0.1:3103;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 90s;
    }

    location /avatars/ {
        proxy_pass http://127.0.0.1:3103;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /assets/ {
        try_files $uri =404;
        include /etc/nginx/snippets/chamados-ti-security-headers.conf;
        expires 30d;
    }

    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/chamados-ti-security-headers.conf;
        expires -1;
    }
}
